{% extends 'store/base.html' %}

{% block title %}تسجيل الدخول بـ Google - إقامتكي{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div style="background:white; border-radius:20px; padding:40px; box-shadow:0 5px 20px rgba(194,24,91,0.1); text-align:center;">
        <div style="font-size:50px;">💗</div>
        <h4 class="fw-bold mt-3" style="color:#c2185b;">تسجيل الدخول بـ Google</h4>
        <p class="text-muted">ستقومين بتسجيل الدخول باستخدام حساب Google</p>
        <form method="POST">
          {% csrf_token %}
          <button type="submit" class="btn w-100 mt-3" style="background:linear-gradient(135deg,#c2185b,#e91e8c); color:white; border-radius:12px; padding:12px; font-weight:900;">
            متابعة 💗
          </button>
        </form>
        <a href="/accounts/login/" class="btn w-100 mt-2" style="background:white; border:2px solid #f8bbd9; border-radius:12px; padding:12px; font-weight:700; color:#c2185b;">
          إلغاء
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
