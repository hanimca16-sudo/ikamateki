<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}إقامتكي{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Tajawal', sans-serif; }
    body { background: #fff0f5; }
    .navbar {
      background: linear-gradient(135deg, #c2185b, #e91e8c, #f06292) !important;
      padding: 12px 20px;
    }
    .navbar-brand { font-size: 22px; font-weight: 900; color: white !important; }
    .nav-btn { border-radius: 20px; font-size: 13px; padding: 5px 12px; }
    footer {
      background: linear-gradient(135deg, #c2185b, #e91e8c);
      color: white;
      padding: 25px 0;
      margin-top: 50px;
    }
    @media (max-width: 768px) {
      .navbar { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
      .navbar div { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
      .navbar .btn { font-size: 10px; padding: 3px 7px; }
      .navbar-brand { font-size: 18px; }
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>

<nav class="navbar navbar-dark d-flex justify-content-between">
  <a class="navbar-brand" href="/">💗 إقامتكي</a>
  <div>
    {% if user.is_authenticated %}
      <a href="/inbox/" class="btn btn-light btn-sm nav-btn me-1">📬 الرسائل</a>
      <a href="/import/" class="btn btn-light btn-sm me-1" style="border-radius:20px;">🛍️ اطلبي</a>
      <a href="/import/orders/" class="btn btn-light btn-sm me-1" style="border-radius:20px;">📦 طلباتي</a>
      <a href="/profile/" class="btn btn-light btn-sm nav-btn me-1">👤 حسابي</a>
      <a href="/about/" class="btn btn-outline-light btn-sm nav-btn me-1">من نحن</a>
      <a href="/contact/" class="btn btn-outline-light btn-sm nav-btn me-1">اتصل بنا</a>
      <form method="POST" action="/accounts/logout/" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-light btn-sm nav-btn">خروج</button>
      </form>
    {% else %}
      <a href="/register/" class="btn btn-light btn-sm nav-btn me-1">إنشاء حساب</a>
      <a href="/accounts/login/" class="btn btn-outline-light btn-sm nav-btn me-1">دخول</a>
      <a href="/about/" class="btn btn-outline-light btn-sm nav-btn me-1">من نحن</a>
      <a href="/contact/" class="btn btn-outline-light btn-sm nav-btn">اتصل بنا</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="text-center">
  <div class="container py-3">
    <p class="mb-1" style="font-size:20px;">💗 إقامتكي</p>
    <p class="mb-1" style="font-size:13px; opacity:0.8;">منصة الإقامات الجامعية</p>
    <div class="mt-2">
      <a href="/about/" class="text-white me-3" style="font-size:13px;">من نحن</a>
      <a href="/contact/" class="text-white" style="font-size:13px;">اتصل بنا</a>
    </div>
    <p class="mt-2 mb-0" style="font-size:12px; opacity:0.7;">© 2026 إقامتكي - جميع الحقوق محفوظة</p>
  </div>
</footer>

</body>
</html>
